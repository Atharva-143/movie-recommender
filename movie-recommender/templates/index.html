<!DOCTYPE html>
<html>

<head>
    <title>Movie Recommender</title>

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }

        h1 {
            color: #e50914;
            margin-top: 30px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 25px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background-color: #e50914;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background-color: #ff1f1f;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            background: #1c1c1c;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
            width: 220px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
            background: #292929;
        }

        .movie-title {
            font-size: 18px;
            margin-top: 10px;
        }

        img {
            border-radius: 10px;
        }

        .rating {
            color: gold;
            margin-top: 5px;
        }

        .genres {
            font-size: 14px;
            color: #ccc;
        }
    </style>

</head>

<body>

    <h1>🎬 Movie Recommender</h1>

    <form action="/recommend" method="get">
        <input type="text" id="movieInput" name="movie" placeholder="Enter movie name" onkeyup="showSuggestions()">
        <div id="suggestions" style="background:#222; width:300px; margin:auto;"></div>
        <button type="submit" onclick="this.innerText='Loading...'">Recommend</button>
    </form>

    <div class="container">
        {% if movies %}
        {% for movie in movies %}
        {% if movie.title == "Movie not found. Please try another name." %}
        <p style="color:red;">{{ movie.title }}</p>
        {% else %}
        <div class="card" onclick="openMovie('{{ movie.title }}')">
            <img src="{{ movie.poster }}" width="200">
            <div class="movie-title">{{ movie.title }}</div>
            <div class="rating">⭐ {{ movie.rating }}</div>
            <div class="genres">{{ movie.genres }}</div>
        </div>
        {% endif %}
        {% endfor %}
        {% endif %}
    </div>

    <script>
        let movieList = [];

        fetch('/movies')
            .then(response => response.json())
            .then(data => movieList = data);

        function showSuggestions() {
            let input = document.getElementById("movieInput").value.toLowerCase();
            let suggestionsBox = document.getElementById("suggestions");

            suggestionsBox.innerHTML = "";

            if (input.length === 0) return;

            let filtered = movieList.filter(movie => movie.toLowerCase().includes(input));

            filtered.slice(0, 5).forEach(movie => {
                let div = document.createElement("div");
                div.innerHTML = movie;
                div.style.padding = "5px";
                div.style.cursor = "pointer";

                div.onclick = function () {
                    document.getElementById("movieInput").value = movie;
                    suggestionsBox.innerHTML = "";
                };

                suggestionsBox.appendChild(div);
            });
        }

        function openMovie(title) {
            window.open(`https://www.google.com/search?q=${title}+movie`, '_blank');
        }
    </script>

</body>

</html>
